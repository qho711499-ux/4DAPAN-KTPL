<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập Hiến pháp & Hệ thống Chính trị</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 10px;
        }
        .question-card {
            margin-bottom: 25px;
            padding: 15px;
            border-bottom: 1px solid #eee;
            background-color: #fff;
            border-radius: 8px;
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            font-size: 1.05rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }
        .option-item:hover {
            background: #f0f7ff;
            border-color: #d6eaf8;
        }
        .option-item input {
            margin-right: 12px;
            cursor: pointer;
        }
        #btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }
        #btn-submit:hover {
            background: #2980b9;
        }
        #result-area {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 1.2rem;
        }
        .correct-bg { background-color: #e8f8f5 !important; border-color: #a3e4d7 !important; }
        .wrong-bg { background-color: #fdedec !important; border-color: #f5b7b1 !important; }
        .correct-text { color: var(--success-color); font-weight: bold; }
        .wrong-text { color: var(--error-color); font-weight: bold; }
        .correct-answer-hint {
            font-size: 0.95em;
            color: var(--success-color);
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Trắc Nghiệm Giáo Dục Kinh Tế & Pháp Luật 10</h1>
    <div id="quiz-container">
        </div>
    
    <button id="btn-submit" onclick="checkQuiz()">Nộp bài và Chấm điểm</button>
    <div id="result-area"></div>
</div>

<script>
    const quizData = [
        { q: "Hệ thống các quy phạm pháp luật có hiệu lực pháp lý cao nhất, quy định về những vấn đề cơ bản nhất về chủ quyền quốc gia, chế độ chính trị, chính sách kinh tế, văn hóa xã hội, tổ chức quyền lực nhà nước, địa vị pháp lí của con người và công dân là", options: ["Hiến pháp.", "Luật giáo dục.", "Luật kinh tế.", "Luật hôn nhân gia đình."], correct: 0 },
        { q: "Đạo luật cơ bản của nước Cộng hòa xã hội chủ nghĩa Việt Nam, có hiệu lực pháp lí cao nhất, do Quốc hội ban hành để quy định những vấn đề quan trọng của đất nước là", options: ["Luật lao động.", "Luật dân sự.", "Luật an ninh quốc gia.", "Hiến pháp."], correct: 3 },
        { q: "Văn bản quy phạm pháp luật nào có hiệu lực pháp lí cao nhất trong hệ thống văn bản quy phạm pháp luật ở nước ta?", options: ["Nghị quyết.", "Hiến pháp.", "Quyết định.", "Pháp lệnh."], correct: 1 },
        { q: "Ở nước ta, việc soạn thảo, thông qua Hiến pháp, sửa đổi Hiến pháp và thủ tục, trình tự giải thích Hiến pháp do cơ quan nào quy định?", options: ["Chính phủ.", "Tòa án nhân dân tối cao.", "Quốc hội.", "Viện Kiểm sát nhân dân tối cao."], correct: 2 },
        { q: "Hiến pháp mới nhất của nước Cộng hòa xã hội chủ nghĩa Việt Nam là Hiến pháp năm", options: ["1993.", "1983.", "2003.", "2013."], correct: 3 },
        { q: "Từ khi thành lập nước Việt Nam dân chủ cộng hòa đến nay, nước ta đã có bao nhiêu bản Hiến pháp?", options: ["05.", "06.", "04.", "03."], correct: 0 },
        { q: "Nhà nước phải ban hành Hiến pháp để", options: ["chấm dứt các hành vi vi phạm pháp luật, ổn định trận tự xã hội.", "giáo dục ý thức tôn trọng pháp luật cho người dân.", "quy định những vấn đề cơ bản, quan trọng nhất của Nhà nước và xã hội.", "Tuyên truyền, phổ biến giáo dục pháp luật cho nhân dân."], correct: 2 },
        { q: "Khi ban hành luật trẻ em 2016, Quốc hội phải căn cứ vào nội dung của Hiến pháp 2013 vì", options: ["Hiến pháp quy định những vấn đề quan trọng của xã hội.", "Hiến pháp là Luật nguồn, nền tảng cho các văn bản luật khác.", "Hiến pháp quy định về tổ chức quyền lực nhà nước.", "đó là đối tượng điều chỉnh của Hiến pháp"], correct: 1 },
        { q: "Hiến pháp 2013 quy định về chủ quyền và lãnh thổ của nước Cộng hòa xã hội chủ nghĩa Việt Nam bao gồm", options: ["đất liền, vùng trời và vùng biển, dưới lòng đất.", "đất liền, dưới lòng đất, và hải đảo, không gian.", "đất liền, vùng biển và hải đảo, không gian.", "đất liền, vùng trời, vùng biển và hải đảo."], correct: 3 },
        { q: "…. của Nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam được Hiến pháp xác định là nhà nước pháp quyền xã hội chủ nghĩa của nhân dân, do nhân dân, vì nhân dân.", options: ["Tính chất.", "Bản chất.", "Đặc trưng", "Đặc điểm"], correct: 1 },
        { q: "“Đường lối đối ngoại của nước ta tạo điều kiện để phát triển đất nước và nâng cao chất lượng, phát triển đời sống xã hội một cách toàn diện” là", options: ["ý nghĩa của chính sách đối ngoại.", "tính chất của chính sách đối ngoại.", "bản chất của chính sách đối ngoại.", "nội dung của chính sách đối ngoại."], correct: 3 },
        { q: "Hiến pháp 2013 có quy định về.…vì đây là một trong những nội dung cơ bản, quan trọng gắn liền với chế độ chính trị của đất nước. Đồng thời, đây cũng là những nội dung thể hiện biểu tượng của mỗi quốc gia trên thế giới.", options: ["Quốc kỳ, Quốc huy, Quốc ca và Quốc khánh.", "Quốc kỳ, Quốc huy, Quốc ca, Quốc khánh và Thủ đô.", "Quốc kỳ, Quốc ca, Quốc khánh và thủ đô.", "Quốc kỳ, Quốc huy, Quốc ca và Thủ đô."], correct: 1 },
        { q: "… là lĩnh vực có tầm quan trọng, quyết định sự tồn tại và phát triển của một quốc gia.", options: ["Hoạt động kinh tế.", "Chế độ chính trị.", "Văn hóa xã hội.", "Văn hóa – giáo dục."], correct: 0 },
        { q: "Nhân dân thông qua các cơ quan nhà nước, các cá nhân được nhân dân ủy quyền để thực hiện ý chí nhân dân; là phương thức chủ yếu để thực hiện quyền lực nhân dân là hình thức dân chủ", options: ["đại diện.", "trực tiếp.", "tập trung.", "thống nhất."], correct: 0 },
        { q: "Trong lúc dọn dẹp vệ sinh ven đường, cô T phát hiện bé sơ sinh bị bỏ rơi, cô đã đưa em đến bệnh viện kiểm tra sức khỏe và tiến hành làm các thủ tục nhân nuôi... Vậy, cô T đã đảm bảo quyền gì cho em bé?", options: ["Quyền sống, được chăm sóc sức khỏe.", "Quyền có nơi ở hợp pháp.", "Quyền không bị phân biệt đối xử.", "Quyền được nuôi dưỡng."], correct: 0 },
        { q: "Phát hiện H đang đi trên đường sau nhiều ngày trốn tránh về khoản nợ, N đã dung vũ lực bắt H về nhà mình nhốt lại và yêu cầu người nhà mang tiền đến trả... N đã xâm phạm đến …. của H.", options: ["quyền bất khả xâm phạm về thân thể.", "quyền bất khả xâm phạm về đời sống riêng tư.", "quyền được bảo hộ về danh dự, nhân phẩm.", "quyền được bảo hộ về tính mạng, sức khỏe."], correct: 0 },
        { q: "Kết thúc chuyến đi, M đã viết bài chia sẻ những trải nghiệm của mình trên các trang báo mạng và nhận được sự phản hồi tích cực từ người đọc. Vậy, M đã thực hiện quyền", options: ["quyền tự do ngôn luận.", "quyền tham gia quản lí nhà nước và xã hội.", "quyền được tự do đi lại.", "quyền tự do tiếp cận thông tin."], correct: 0 },
        { q: "Nội dung về kinh tế được quy định tại các Điều từ 50 đến 56 của Hiến pháp năm 2013. Theo đó, nền kinh tế Việt Nam là nền kinh tế thị trường", options: ["theo hướng tư bản chủ nghĩa.", "coi trọng phát triển nông nghiệp.", "gắn với hội nhập quốc tế.", "định hướng xã hội chủ nghĩa."], correct: 3 },
        { q: "Theo quy định của Hiến pháp năm 2013, nền kinh tế Việt Nam là nền kinh tế thị trường định hướng xã hội chủ nghĩa với nhiều hình thức sở hữu, nhiều thành phần kinh tế,", options: ["kinh tế tư nhân giữ vai trò chủ đạo.", "kinh tế nhà nước giữ vai trò chủ đạo.", "kinh tế tập thể giữ vai trò chủ đạo.", "kinh tế tư bản nhà nước là chủ đạo."], correct: 1 },
        { q: "Theo quy định của Hiến pháp năm 2013, các chủ thể thuộc các thành phần kinh tế hoạt động theo pháp luật, bình đẳng trước pháp luật, hợp tác và", options: ["cạnh tranh gay gắt.", "chia nhau lợi ích.", "cạnh tranh lành mạnh.", "mở rộng thị trường."], correct: 2 },
        { q: "Theo quy định của Hiến pháp năm 2013, Đất đai, tài nguyên nước, khoáng sản, nguồn lợi ở vùng biển, vùng trời….và các tài sản do Nhà nước đầu tư, quản lí là", options: ["tài sản công thuộc sở hữu toàn dân.", "tài sản công được khai thác tự do.", "tài sản của dân, do dân khai phá.", "tài sản công và chia đều cho nhân dân."], correct: 0 },
        { q: "Theo quy định của Hiến pháp về vai trò, trách nhiệm của Nhà nước và xã hội trong các lĩnh vực văn hóa, xã hội là luôn tạo sự bình đẳng về cơ hội để công dân", options: ["được làm việc theo sở thích.", "đóng góp thu nhập cho xã hội.", "thụ hưởng phúc lợi xã hội.", "làm chủ cuộc sống của mình."], correct: 2 },
        { q: "Theo quy định của Hiến pháp năm 2013 ở Điều 60 về vai trò, trách nhiệm của Nhà nước và xã hội trong lĩnh vực văn hóa là luôn chăm lo xây dựng và phát triển nền văn hóa Việt Nam", options: ["tiên tiến, đậm đà bản sắc dân tộc.", "tiến bộ để hội nhập với thế giới.", "theo mô hình của các nước tư bản.", "phát huy bản sắc văn hóa dân tộc."], correct: 0 },
        { q: "Theo quy định của Hiến pháp năm 2013 ở Điều 60 về vai trò, trách nhiệm của Nhà nước và xã hội đối với lĩnh vực xã hội là", options: ["xây dựng nền văn hóa tiên tiến.", "gìn giữ các giá trị văn hóa dân tộc.", "phát huy các truyền thống văn hóa.", "tạo việc làm cho người lao động."], correct: 3 },
        { q: "Điều 61 Hiến pháp năm 2013 quy định: Phát triển giáo dục là quốc sách hàng đầu nhằm nâng cao dân trí, phát triển nguồn nhân lực và", options: ["bồi dưỡng nhân tài cho đất nước.", "hội nhập với nền kinh tế thế giới.", "tập trung phát triển kinh tế tri thức.", "đào tạo đội ngũ các nhà khoa học."], correct: 0 },
        { q: "Điều 62 Hiến pháp năm 2013 khẳng định: Phát triển khoa học và công nghệ là quốc sách hàng đầu. Nhà nước bảo đảm quyền nghiên cứu khoa học và công nghệ; bảo hộ", options: ["quyền tự do kinh doanh.", "quyền sở hữu trí tuệ.", "quyền tự do học tập.", "quyền sở hữu tài sản."], correct: 1 },

        { q: "Để thực hiện chức năng quản lí nhà nước và xã hội, Nhà nước ta đã thiết lập bộ máy nhà nước từ", options: ["trung ương đến địa phương.", "trung ương đến cấp tỉnh.", "trung ương đến cấp huyện.", "tỉnh đến các xã, phường."], correct: 0 },
        { q: "Bộ máy nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam được tổ chức phân cấp phù hợp với các đơn vị hành chính đất nước và gồm 3 nhóm cơ quan tạo thành là", options: ["cơ quan lập pháp, hành pháp, tư pháp.", "cơ quan lập pháp, lập hiến, tư pháp.", "cơ quan lập pháp, hành pháp, cơ quan ngang bộ.", "Quốc hội, Chính phủ và Ủy ban nhân dân."], correct: 0 },

        { q: "Người đứng đầu Nhà nước, thay mặt nước Cộng hòa xã hội chủ nghĩa việt Nam về đối nội và đối ngoại là", options: ["Chủ tịch quốc hội.", "Thủ tướng chính phủ.", "Chủ tịch hội đồng nhân dân.", "Chủ tịch nước."], correct: 3 },
        { q: "Theo quy định tại Điều 107 của Hiến pháp. Viện kiểm sát nhân dân là cơ quan thực hành quyền công tố và", options: ["điều tra trấn áp tội phạm.", "kiểm sát hoạt động tư pháp.", "xét xử các vụ án hình sự.", "giám sát hoạt động của Chính phủ."], correct: 1 },
        { q: "Theo quy định của Hiến pháp năm 2013, Tổng Kiểm toán nhà nước chịu trách nhiệm và báo cáo kết quả kiểm toán, báo cáo công tác trước cơ quan nào?", options: ["Quốc hội.", "Chính phủ.", "Chủ tịch nước.", "Tổng Bí thư."], correct: 0 },
        { q: "Theo quy định của Hiến pháp năm 2013, Tổng Kiểm toán nhà nước chịu trách nhiệm và báo cáo công tác trước Quốc hội, trong thời gian Quốc hội không họp thì chịu trách nhiệm và báo cáo trước cơ quan nào sau đây?", options: ["Ủy ban thường vụ Quốc hội.", "Viện kiểm sát nhân dân tối cao.", "Bộ và cơ quan ngang bộ.", "Văn phòng chính phủ."], correct: 0 },

        { q: "Theo quy định của Hiến pháp 2013, việc làm nào sau đây thể hiện trách nhiệm của công dân trong việc thực hiện chính sách tài nguyên và bảo vệ môi trường?", options: ["Sử dụng nhiên liệu tái tạo.", "Kế hoạch phản biện xã hội.", "Hưởng trợ cấp thất nghiệp.", "Làm giả hồ sơ bảo hiểm."], correct: 0 }
    ];

    const quizContainer = document.getElementById('quiz-container');

    // Hàm tạo giao diện hiển thị câu hỏi
    function displayQuiz() {
        // Lưu ý: Mảng chỉ có 88 câu do không có câu 71 trong dữ liệu gốc
        quizData.forEach((item, index) => {
            // Xử lý số câu hỏi hiển thị cho khớp với đề bài (bỏ qua số 71)
            let displayNum = index + 1;
            if (displayNum > 70) displayNum += 1;

            const card = document.createElement('div');
            card.className = 'question-card';
            
            let optionsHTML = '';
            item.options.forEach((opt, i) => {
                optionsHTML += `
                    <label class="option-item">
                        <input type="radio" name="q${index}" value="${i}">
                        ${String.fromCharCode(65 + i)}. ${opt}
                    </label>
                `;
            });

            card.innerHTML = `
                <span class="question-text">Câu ${displayNum}: ${item.q}</span>
                <div class="options">${optionsHTML}</div>
                <div id="ans-hint-${index}" class="correct-answer-hint">Đáp án đúng: ${String.fromCharCode(65 + item.correct)}</div>
            `;
            quizContainer.appendChild(card);
        });
    }

    // Hàm xử lý khi người dùng ấn nút chấm điểm
    function checkQuiz() {
        let score = 0;
        let unanswered = 0;

        quizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const hint = document.getElementById(`ans-hint-${index}`);
            
            // Xóa class màu sắc cũ (nếu người dùng nộp nhiều lần)
            const allLabels = document.querySelectorAll(`input[name="q${index}"]`);
            allLabels.forEach(radio => {
                radio.parentElement.classList.remove('correct-bg', 'wrong-bg');
            });

            if (selected) {
                if (parseInt(selected.value) === item.correct) {
                    score++;
                    selected.parentElement.classList.add('correct-bg');
                } else {
                    selected.parentElement.classList.add('wrong-bg');
                }
            } else {
                unanswered++;
            }
            
            // Luôn hiển thị đáp án đúng sau khi nộp
            hint.style.display = 'block';
        });

        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';
        
        let message = `<h3>Kết quả của bạn: <span class="correct-text">${score}/${quizData.length}</span> câu đúng</h3>
                       <p>Tỉ lệ chính xác: <strong>${((score/quizData.length)*100).toFixed(2)}%</strong></p>`;
                       
        if (unanswered > 0) {
            message += `<p style="color: var(--error-color); font-size: 0.9em;">Bạn đã bỏ trống ${unanswered} câu.</p>`;
        }
        
        resultArea.innerHTML = message;
        resultArea.style.backgroundColor = '#e8f4fd';
        resultArea.style.border = '2px solid var(--secondary-color)';
        
        // Tự động cuộn xuống cuối trang để xem điểm
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Render bộ câu hỏi ngay khi load trang
    window.onload = displayQuiz;
</script>
