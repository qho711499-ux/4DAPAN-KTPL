    // Cấu hình đáp án chuẩn (Bạn có thể khai báo đáp án đúng của 88 câu vào đây để hệ thống tự chấm điểm).
    // Ví dụ: Câu 1 chọn A -> 'A', Câu 2 chọn D -> 'D'.
    const answerKey = {
        0: 'A', // Câu 1
        1: 'D', // Câu 2
        2: 'B', // Câu 3
        3: 'C', // Câu 4
        4: 'D', // Câu 5
        5: 'A', // Câu 6
        // Cập nhật thêm các đáp án khác tại đây
    };

    const container = document.getElementById('quiz-container');

    // Hàm sinh giao diện bài trắc nghiệm
    function renderQuiz() {
        questionsData.forEach((dataBlock, index) => {
            const parts = dataBlock.split("|||");
            const questionText = parts[0];
            const options = parts.slice(1);

            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `qcard-${index}`;

            const qTitle = document.createElement('div');
            qTitle.className = 'question-text';
            qTitle.innerHTML = questionText;
            card.appendChild(qTitle);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            const optionLetters = ['A', 'B', 'C', 'D'];

            options.forEach((optText, optIndex) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.id = `label-q${index}-${optionLetters[optIndex]}`;

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `question_${index}`;
                radio.value = optionLetters[optIndex];

                const span = document.createElement('span');
                span.innerHTML = optText;

                label.appendChild(radio);
                label.appendChild(span);
                optionsDiv.appendChild(label);
            });

            card.appendChild(optionsDiv);
            container.appendChild(card);
        });
    }

    // Hàm xử lý chấm điểm tự động
    function calculateScore() {
        let score = 0;
        let answered = 0;
        const total = questionsData.length;

        // Xóa class màu sắc trước đó
        document.querySelectorAll('.option-label').forEach(el => {
            el.classList.remove('correct-ans', 'wrong-ans');
        });

        questionsData.forEach((_, index) => {
            const selectedOpt = document.querySelector(`input[name="question_${index}"]:checked`);
            if (selectedOpt) {
                answered++;
                const userAns = selectedOpt.value;
                const correctAns = answerKey[index];

                // Nếu bạn đã khai báo đáp án cho câu này
                if (correctAns) {
                    if (userAns === correctAns) {
                        score++;
                        document.getElementById(`label-q${index}-${userAns}`).classList.add('correct-ans');
                    } else {
                        document.getElementById(`label-q${index}-${userAns}`).classList.add('wrong-ans');
                        document.getElementById(`label-q${index}-${correctAns}`).classList.add('correct-ans');
                    }
                } else {
                    // Nếu chưa khai báo đáp án, mặc định chuyển thẻ thành xanh (minh họa)
                    document.getElementById(`label-q${index}-${userAns}`).classList.add('correct-ans');
                }
            }
        });

        const resultBox = document.getElementById('result-display');
        resultBox.innerHTML = `Hoàn thành: ${answered}/${total} câu <br> Điểm: ${score}/${Object.keys(answerKey).length || total}`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // Khởi tạo trang web
    window.onload = renderQuiz;
</script>
